<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#07091a" />
    <meta name="description" content="Blockfall Arena is a touch-first falling-block game with live battles for up to eight players." />
    <meta property="og:title" content="Blockfall Arena" />
    <meta property="og:description" content="Stack clean, clear hard, and outlast up to seven rivals." />
    <meta property="og:image" content="https://blockfall-arena.vercel.app/assets/blockfall-arena-bg.webp" />
    <title>Blockfall Arena</title>
  </head>
  <body>
    <main id="app" class="app-shell" aria-label="Blockfall Arena">
      <section class="game-layout">
        <div class="hud" aria-label="Game status">
          <div class="stat"><span data-i18n="score">Score</span><strong id="score">0</strong></div>
          <div class="stat"><span data-i18n="lines">Lines</span><strong id="lines">0</strong></div>
          <div class="stat"><span data-i18n="level">Level</span><strong id="level">1</strong></div>
          <button id="solo-lanes" class="lane-pill" type="button" aria-label="Switch board width">10 lanes</button>
          <div id="arena-status" class="arena-status is-hidden"><i></i><span>Arena · 1/8</span></div>
          <button id="sound" class="icon-button" type="button" aria-label="Mute sound">♪</button>
          <button id="pause" class="icon-button" type="button" aria-label="Pause">Ⅱ</button>
        </div>

        <aside id="opponents" class="opponents is-hidden" aria-label="Other players"></aside>

        <div class="play-zone">
          <aside class="piece-rail" aria-label="Next pieces">
            <section><span data-i18n="next">Next</span><canvas id="next-canvas" width="96" height="216"></canvas></section>
          </aside>

          <div id="board-wrap" class="board-wrap">
            <canvas id="game-canvas" width="300" height="600" tabindex="0" aria-label="Falling-block game board"></canvas>
            <div id="callout" class="callout" aria-live="polite"></div>
            <div id="connection-overlay" class="connection-overlay is-hidden" data-i18n="reconnecting">Reconnecting…</div>

            <div id="waiting-overlay" class="waiting-overlay is-hidden" aria-live="polite">
              <div class="waiting-card">
                <div class="waiting-blocks" aria-hidden="true"><i></i><i></i><i></i></div>
                <strong data-i18n="waiting">Waiting for a rival…</strong>
                <span id="waiting-count">1/8 players ready</span>
                <div class="lane-choice" aria-label="Board width">
                  <button id="arena-10" class="active" type="button">10 lanes</button>
                  <button id="arena-4" type="button">4 lanes</button>
                </div>
                <button id="arena-play" class="arena-play" type="button" data-i18n="playArena">Play</button>
              </div>
            </div>

            <div id="pause-overlay" class="overlay is-hidden">
              <div class="panel compact"><small data-i18n="pausedLabel">Stack frozen</small><h2 data-i18n="paused">Paused</h2><button id="resume" class="primary" type="button" data-i18n="resume">Resume</button></div>
            </div>

            <div id="end-overlay" class="overlay is-hidden">
              <div class="panel end-panel">
                <small id="end-label" data-i18n="runComplete">Run complete</small>
                <h2 id="end-title">12,400</h2>
                <p id="end-copy" data-i18n="stackAgain">Ready for another stack?</p>
                <div class="record-tabs" role="tablist">
                  <button id="friends-tab" class="active" type="button" data-i18n="friends">Friends</button>
                  <button id="global-tab" type="button" data-i18n="global">Global</button>
                </div>
                <div id="records" class="records" aria-live="polite"></div>
                <button id="restart" class="primary" type="button" data-i18n="playAgain">Play again</button>
              </div>
            </div>
          </div>
        </div>

        <div class="touch-controls" aria-label="Touch controls">
          <button id="hold" class="hold-control" type="button"><canvas id="hold-canvas" width="96" height="72" aria-hidden="true"></canvas><b data-i18n="hold">Hold</b></button>
          <button id="drop" class="drop" type="button"><span>▼</span><b data-i18n="drop">Down</b></button>
        </div>
      </section>
    </main>
    <script src="https://usions.com/usion-sdk.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
