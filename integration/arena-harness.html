<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8"><title>Arena relay harness</title></head>
  <body>
    <output id="status">booting</output>
    <button id="attack" type="button">Prepare Tetris</button>
    <button id="drop" type="button">Hard drop</button>
    <script type="module">
      import { ArenaSession } from "/src/arena-session.ts";
      import { decodeBoard, encodeBoard } from "/src/game/codec.ts";
      import { initializeUsion, UsionBridge } from "/src/usion.ts";

      const params = new URLSearchParams(location.search);
      const playerId = params.get("player") || "host";
      const bootDelay = Math.max(0, Number(params.get("bootDelay")) || 0);
      const nativeHost = params.get("native") === "1";
      const channel = new BroadcastChannel("blockfall-arena-integration");
      const handlers = {};
      let sent = 0;
      let sdkInitialized = false;

      function relay(payload, reliable = false) {
        sent += 1;
        if (!reliable && sent % 20 === 0) return;
        const jitter = (sent % 5) * 18;
        setTimeout(() => channel.postMessage({ ...payload, sender: playerId }), 120 + jitter);
      }

      const game = {
        connect: async () => ({}),
        join: async () => {
          handlers.joined?.({ player_id: playerId, player_ids: ["host", "guest"] });
          relay({ kind: "join" }, true);
          return { player_id: playerId, player_ids: ["host", "guest"] };
        },
        realtime(type, data) {
          const reliable = ["arena_hello", "arena_roster", "arena_countdown", "arena_start", "arena_end"].includes(type);
          relay({ kind: "realtime", type, data }, reliable);
        },
        onJoined: (callback) => (handlers.joined = callback, () => {}),
        onPlayerJoined: (callback) => (handlers.playerJoined = callback, () => {}),
        onPlayerLeft: (callback) => (handlers.playerLeft = callback, () => {}),
        onRealtime: (callback) => (handlers.realtime = callback, () => {}),
        onRoomAssigned: (callback) => (handlers.roomAssigned = callback, () => {}),
        onConnectionState: (callback) => (handlers.connection = callback, () => {}),
        onReconnected: (callback) => (handlers.reconnected = callback, () => {}),
        onError: (callback) => (handlers.error = callback, () => {}),
        saveState: () => true,
        loadState: () => null
      };

      const api = {
        config: { userId: playerId, userName: playerId, language: "en", theme: "dark", roomId: "integration-room", playerIds: ["host", "guest"], mode: "multiplayer" },
        getLanguage: () => "en",
        getTheme: () => "dark",
        getLaunchParams: () => ({ roomId: "integration-room", mode: "multiplayer" }),
        user: { getId: () => playerId, getName: () => playerId, getAvatar: () => "" },
        storage: { get: async () => null, set: async () => true },
        leaderboard: {},
        game
      };
      api.init = async () => { sdkInitialized = true; return api.config; };
      if (nativeHost) {
        window.ReactNativeWebView = { postMessage() {} };
        window.Usion = api;
      }

      const state = { roundStarted: false, countdown: -1, ended: false, events: 0, errors: [] };
      const bridge = nativeHost ? await initializeUsion() : new UsionBridge(api.config, api);
      const session = new ArenaSession(bridge, {
        mode: () => render(),
        event: () => { state.events += 1; render(); },
        countdown: (seconds) => { state.countdown = seconds; render(); },
        roundStart: () => { state.roundStarted = true; render(); },
        roundEnd: () => { state.ended = true; render(); },
        connection: () => render(),
        error: (message) => { state.errors.push(message); render(); }
      });

      channel.onmessage = ({ data }) => {
        if (!data || data.sender === playerId) return;
        if (data.kind === "join") handlers.playerJoined?.({ player_id: data.sender, player_ids: ["host", "guest"] });
        if (data.kind === "realtime") handlers.realtime?.({ player_id: data.sender, action_type: data.type, action_data: data.data });
      };

      function render() {
        const opponent = [...session.opponents().values()][0];
        document.querySelector("#status").textContent = JSON.stringify({
          playerId,
          sdkInitialized,
          arena: session.isArena(),
          roundStarted: state.roundStarted,
          countdown: state.countdown,
          playerCount: session.playerCount(),
          readyOpponents: session.readyOpponentIds(),
          localScore: session.snapshot().score,
          opponentScore: opponent?.score ?? null,
          pendingGarbage: session.snapshot().pendingGarbage,
          garbageCells: session.snapshot().board.flat().filter((cell) => cell === 8).length,
          events: state.events,
          ended: state.ended,
          errors: state.errors
        });
      }

      document.querySelector("#attack").addEventListener("click", () => {
        const current = session.local.networkSnapshot();
        const board = decodeBoard(current.board);
        for (let y = 16; y < 20; y += 1) board[y] = [0, 2, 2, 2, 2, 2, 2, 2, 2, 2];
        session.local.restore({ ...current, board: encodeBoard(board), active: { type: "I", rotation: 1, x: -2, y: 16 }, phase: "playing", clearRows: [], clearProgress: 0 });
      });
      document.querySelector("#drop").addEventListener("click", () => session.command("hard-drop"));
      // An invite-card tap seats the friend before their game iframe loads.
      // Reproduce that production ordering when bootDelay is provided.
      if (bootDelay) relay({ kind: "join" }, true);
      setTimeout(() => {
        session.start();
        setInterval(() => { session.update(20); render(); }, 20);
      }, bootDelay);
    </script>
  </body>
</html>
